name: Nightly catalog pipeline

# Phase 4 v1: orchestrates verify + apply-decisions nightly so the catalog
# absorbs the user's admin/triage decisions without a manual run.
#
# Sequence per run:
#   1. Run verify:bonuses with --persist → refreshes bonus_verifications +
#      catalog_verification_state. Surfaces new mismatches for the human to
#      triage at /admin/triage on their next session.
#   2. Run verify:cards with --persist → same for cards. Allowed to fail
#      (continue-on-error) because card pages have higher fetch flakiness.
#   3. Run catalog:apply-decisions --write → applies every
#      verification_decisions row whose verdict='approved' and applied_at IS
#      NULL.  This is what closes the loop between the user's triage clicks
#      and the live lib/data/*.ts files.
#   4. If lib/data/* changed → open a PR for the user to review and merge.
#      If nothing changed → no commit, the workflow just exits clean.
#
# What this DOESN'T do (Phase 4 v2 territory):
#   - Run discover or promote-leads. Both depend on review-queue/leads.json
#     which is gitignored and local-only.  Moving lead status to Supabase is
#     the v2 work.  Until then, the user's local `npm run discover:bonuses`
#     remains the source of new leads.
#
# Required GitHub repo secrets:
#   - ANTHROPIC_API_KEY                  (for verify escalation)
#   - NEXT_PUBLIC_SUPABASE_URL           (for verify --persist + apply-decisions)
#   - SUPABASE_SERVICE_ROLE_KEY          (same)

on:
  schedule:
    # 13:00 UTC daily (1 hour after discover-bonuses so verify sees fresh state).
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # PR body needs git log context

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # ─── Step 1: refresh bonus verification queue ─────────────────────
      - name: Verify bonuses + persist to Supabase
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run verify:bonuses -- --persist
        continue-on-error: true

      # ─── Step 2: refresh card verification queue (best-effort) ────────
      - name: Verify cards + persist to Supabase
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run verify:cards -- --persist
        continue-on-error: true

      # ─── Step 3: apply admin triage decisions to live catalog ─────────
      - name: Apply admin triage decisions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run catalog:apply-decisions -- --write

      # ─── Step 4: detect catalog changes ───────────────────────────────
      - name: Detect catalog changes
        id: changes
        run: |
          if git diff --quiet lib/data/; then
            echo "catalog_changed=false" >> "$GITHUB_OUTPUT"
            echo "No catalog changes this run."
          else
            echo "catalog_changed=true" >> "$GITHUB_OUTPUT"
            echo "Catalog changed — will open a PR."
            git diff --stat lib/data/
          fi

      # ─── Step 5a: no changes → exit clean ──────────────────────────────
      - name: No-op when nothing changed
        if: steps.changes.outputs.catalog_changed == 'false'
        run: echo "Nothing to commit."

      # ─── Step 5b: changes → open PR ────────────────────────────────────
      - name: Open auto-apply PR
        if: steps.changes.outputs.catalog_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          today=$(date -u +%Y-%m-%d)
          branch="catalog/nightly-$today-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add lib/data/

          # Build a per-edit summary from the apply-decisions report.
          applied_count=$(jq '[.[] | select(.status=="applied")] | length' verification-output/apply-decisions-report.json 2>/dev/null || echo "?")
          skipped_count=$(jq '[.[] | select(.status=="from-mismatch" or .status=="not-found" or .status=="parse-error")] | length' verification-output/apply-decisions-report.json 2>/dev/null || echo "?")

          git commit -m "chore(catalog): nightly auto-apply $today

          Applied $applied_count admin triage decision(s) from /admin/triage and
          /admin/card-triage. $skipped_count edit(s) skipped (refused to mutate
          because the catalog's stored value didn't match the decision's
          from_value — investigate via verification-output/apply-decisions-report.json
          in the run artifacts).

          Triggered by: scheduled run / workflow_dispatch
          Workflow: .github/workflows/nightly-catalog-pipeline.yml"

          git push origin "$branch"

          gh pr create \
            --title "Nightly catalog auto-apply: $today ($applied_count edit(s))" \
            --body "Automated catalog update from the nightly pipeline. Review the diff and merge if it looks right.

          ## What ran
          1. \`verify:bonuses --persist\` — refreshed bonus verification queue
          2. \`verify:cards --persist\` — refreshed card verification queue
          3. \`catalog:apply-decisions --write\` — applied admin triage decisions

          ## Numbers
          - **$applied_count** triage decisions applied to live catalog
          - **$skipped_count** skipped (stored value drifted since the decision was made — see report artifact)

          ## Where state lives
          - **Triage decisions**: Supabase \`verification_decisions\` + \`card_verification_decisions\` (already cross-machine)
          - **Discover leads**: still local-only (\`review-queue/leads.json\` gitignored). Phase 4 v2 will move these to Supabase too.

          Triggered by: \`${{ github.event_name }}\`" \
            --base main \
            --head "$branch"

      # ─── Step 6: upload artifacts for debugging ───────────────────────
      - name: Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-reports-${{ github.run_id }}
          path: |
            verification-output/*.json
            verification-output/*.md
          retention-days: 14
          if-no-files-found: ignore
