name: Verify credit card + checking/savings offers

# Weekly verification of every non-expired entry in both catalogs.
# Hits each issuer's offer page, compares to stored bonus/spend/fee,
# writes problem rows to Supabase. Admin reviews the queue at
# /admin (Card Verifications tab).
#
# Required GitHub repo secrets:
#   - NEXT_PUBLIC_SUPABASE_URL
#   - SUPABASE_SERVICE_ROLE_KEY

on:
  schedule:
    # Sundays 14:00 UTC (Sunday morning Hawaii / midday US Eastern).
    - cron: "0 14 * * 0"
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    # verify:cards alone took 30+ min on its first full uncached fetch
    # (Amex CSP fallback + IHG/issuer retries push real latency to 10-30s
    # per page). Adding verify:bonuses roughly doubles the surface area,
    # so bump headroom to 150 min. Cron runs weekly — runtime cost is
    # irrelevant compared to catching a stale-link regression early.
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run verify:cards
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # Drop --no-cache: each Actions run starts with an empty .cache
        # directory anyway, so it's a no-op that just signals intent.
        run: npm run verify:cards -- --persist

      - name: Run verify:bonuses
        if: always()
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run verify:bonuses -- --persist

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-output
          path: verification-output/
          retention-days: 30
